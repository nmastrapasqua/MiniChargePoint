<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniChargePoint</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>⚡ MiniChargePoint</h1>
    <span id="ws-status" class="badge disconnected">Disconnesso</span>
  </header>

  <main>
    <!-- Status cards -->
    <section class="cards">
      <div class="card" id="card-connector">
        <h2>Connettore</h2>
        <span id="connector-state" class="state-badge available">Available</span>
      </div>
      <div class="card" id="card-meter">
        <h2>Energia</h2>
        <span id="meter-value" class="meter">0</span>
        <span class="meter-unit">Wh</span>
      </div>
      <div class="card" id="card-session">
        <h2>Sessione</h2>
        <p>Transaction: <span id="transaction-id">—</span></p>
        <p>idTag: <span id="id-tag">—</span></p>
      </div>
      <div class="card" id="card-cs">
        <h2>Central System</h2>
        <span id="cs-status" class="badge disconnected">Disconnesso</span>
      </div>
      <div class="card" id="card-fw">
        <h2>Firmware</h2>
        <span id="fw-status" class="badge disconnected">Disconnesso</span>
      </div>
    </section>

    <!-- Controls -->
    <section class="controls">
      <h2>Controlli</h2>
      <div class="btn-group">
        <button id="btn-plug-in" class="btn btn-primary" aria-label="Inserisci connettore">Plug In</button>
        <button id="btn-plug-out" class="btn btn-secondary" aria-label="Rimuovi connettore">Plug Out</button>
      </div>
      <div class="btn-group charge-group">
        <label for="input-idtag" class="sr-only">idTag</label>
        <input id="input-idtag" type="text" placeholder="idTag" value="TESTIDTAG1" aria-label="idTag per la ricarica">
        <button id="btn-start-charge" class="btn btn-success" aria-label="Avvia ricarica">Start Charge</button>
        <button id="btn-stop-charge" class="btn btn-warning" aria-label="Arresta ricarica">Stop Charge</button>
      </div>
      <div class="btn-group">
        <button id="btn-err-hw" class="btn btn-danger" aria-label="Simula guasto hardware">HW Fault</button>
        <button id="btn-err-tamper" class="btn btn-danger" aria-label="Simula manomissione">Tamper</button>
        <button id="btn-clear-err" class="btn btn-outline" aria-label="Risolvi errore">Clear Error</button>
      </div>
    </section>

    <!-- Log rimosso -->
  </main>

  <script src="app.js"></script>
</body>
</html>
